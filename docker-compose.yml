# docker-compose.yml
services:

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage   # ← 백업 대상

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  mem0:
    build: ./mem0
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant

  mem0-mcp-server:
    build:
      context: ./mem0-mcp-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MEM0_URL=http://mem0:8000
      - MCP_TRANSPORT=sse
      - MCP_PORT=8001
    depends_on:
      - mem0
